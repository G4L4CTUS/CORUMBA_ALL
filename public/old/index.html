<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Corumba T.I.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tab-panel { transition: opacity 0.3s ease; }
        .card-impressora:hover .btn-deletar { opacity: 1 !important; }
        #lista-computadores {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding-bottom: 2rem;
        }
    </style>
</head>

<body class="padding-24 bg-[#020617] text-white font-sans overflow-x-hidden">
    <ul class="bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div style="max-width: 1280px; margin-left: auto; margin-right: auto; position: relative; z-index: 10;" class="px-6">

        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-top: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(30, 41, 59, 0.6);">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="https://corumba.digital/assets/c.regular.svg" style="width: 2rem; height: 2rem; opacity: 0.8;" onerror="this.style.display='none'">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700; letter-spacing: -0.025em;">MONITOR CORUMBA</h1>
                    <p style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em;">Infraestrutura & Redes</p>
                </div>
            </div>
            <button id="btn-add-printer" onclick="abrirModalImpressora()" style="background-color: #2563eb; padding: 0.625rem 2.5rem; border-radius: 0.75rem; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.05em; transition: background-color 0.2s; cursor: pointer; border: none; color: white;">+ Impressora</button>
        </header>

        <nav style="display: flex; gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(30, 41, 59, 0.6);">
            <button class="tab-btn active" data-tab="impressoras" style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; background: none; border: none; cursor: pointer; color: white;">🖨️ Impressoras</button>
            <button class="tab-btn" data-tab="planta" style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; background: none; border: none; cursor: pointer; color: #64748b;">🗺️ Planta Baixa</button>
            <button class="tab-btn" data-tab="computadores" style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; background: none; border: none; cursor: pointer; color: #64748b;">🖥️ Computadores</button>
        </nav>

        <div id="tab-impressoras" class="tab-panel">
            <div id="arvore" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>

        <div id="tab-planta" class="tab-panel" style="display: none;">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 0; text-align: center;">
                <div style="font-size: 3.75rem; margin-bottom: 1rem;">🗺️</div>
                <h2 style="font-size: 1.5rem; font-weight: 700; color: #94a3b8; margin-bottom: 0.5rem;">PLANTA BAIXA</h2>
                <p style="color: #475569; font-size: 0.875rem; max-width: 28rem;">Mapa interativo em desenvolvimento.</p>
            </div>
        </div>

        <div id="tab-computadores" class="tab-panel" style="display: none;">
            <div id="lista-computadores"></div>
        </div>
    </div>

    <div id="modal-impressora" style="display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem;">
        <div style="background-color: #0d1117; border: 1px solid rgba(100, 116, 139, 0.6); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 28rem;">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #60a5fa;">NOVA IMPRESSORA</h2>
            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <input id="in-unit" placeholder="CLIENTE / UNIDADE" style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; color: white;">
                <input id="in-name" placeholder="SETOR" style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; color: white;">
                <input id="in-ip" placeholder="ENDEREÇO IP" style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; color: white;">
                <input id="in-model" placeholder="MODELO (ex: L6270)" style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; color: white;">
                <div style="display: flex; gap: 0.75rem; padding-top: 0.5rem;">
                    <button onclick="fecharModalImpressora()" style="flex: 1; background-color: #1e293b; padding: 0.875rem; border-radius: 0.75rem; color: white;">CANCELAR</button>
                    <button onclick="salvarImpressora()" style="flex: 1; background-color: #2563eb; padding: 0.875rem; border-radius: 0.75rem; color: white;">SALVAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let abertos = JSON.parse(localStorage.getItem('abertos') || '[]');

        // --- NAVEGAÇÃO ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabAlvo = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => { b.style.color = '#64748b'; b.classList.remove('active'); });
                document.querySelectorAll('.tab-panel').forEach(p => { p.style.display = 'none'; });
                btn.style.color = 'white';
                btn.classList.add('active');
                document.getElementById('tab-' + tabAlvo).style.display = 'block';
                document.getElementById('btn-add-printer').style.display = (tabAlvo === 'impressoras') ? 'block' : 'none';
            });
        });

        // --- IMPRESSORAS ---
        socket.on('printerUpdate', (data) => {
            if (!Array.isArray(data)) return;
            renderImpressoras(data);
        });

        function renderImpressoras(data) {
            const container = document.getElementById('arvore');
            if (!container) return;

            const grupos = data.reduce((acc, imp) => {
                const unidade = imp.unit || 'GERAL';
                if (!acc[unidade]) acc[unidade] = { items: [], err: false };
                acc[unidade].items.push(imp);
                if (imp.hasError) acc[unidade].err = true;
                return acc;
            }, {});

            container.innerHTML = Object.keys(grupos).sort().map(nome => {
                const g = grupos[nome];
                const aberto = abertos.includes(nome);
                return `
                    <div style="border-radius: 1rem; overflow: hidden; border: 1px solid ${g.err ? 'rgba(239, 68, 68, 0.4)' : 'rgba(30, 41, 59, 0.6)'}; margin-bottom: 0.5rem;">
                        <div onclick="toggleGrupo('${nome}')" style="display: flex; justify-content: space-between; align-items: center; padding: 1.25rem; cursor: pointer;">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <span style="font-size: 1.5rem;">${aberto ? '📂' : '📁'}</span>
                                <div><h2 style="font-size: 1.25rem; font-weight: 700; color: #60a5fa;">${nome}</h2><p style="font-size: 0.625rem; color: #64748b;">${g.items.length} DISPOSITIVO(S)</p></div>
                            </div>
                            <span>${aberto ? '▲' : '▼'}</span>
                        </div>
                        ${aberto ? `<div style="padding: 1.5rem; background: rgba(0,0,0,0.1); border-top: 1px solid rgba(30,41,59,0.4);"><div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">${g.items.map(i => cardImpressora(i)).join('')}</div></div>` : ''}
                    </div>`;
            }).join('');
        }

        function cardImpressora(imp) {
            if (!imp) return '';
            
            // Blindagem do contador de páginas (Causa principal do erro anterior)
            let paginas = "0";
            try {
                const pValue = Number(imp.pageCount);
                paginas = isNaN(pValue) ? "0" : pValue.toLocaleString('pt-BR');
            } catch (e) { paginas = "0"; }

            const statusCor = imp.status === 'offline' ? '#dc2626' : (imp.hasError ? '#f97316' : '#10b981');
            const coresToner = ['#94a3b8', '#22d3ee', '#ec4899', '#facc15'];

            const tonersHTML = (imp.toners || []).map((t, i) => `
                <div style="background: rgba(0,0,0,0.2); padding: 0.6rem; border-radius: 0.5rem; border: 1px solid rgba(30,41,59,0.4);">
                    <div style="display: flex; justify-content: space-between; font-size: 0.6rem; margin-bottom: 4px;">
                        <span style="color: #64748b;">${imp.isColor ? ['K','C','M','Y'][i] : 'TONER'}</span>
                        <span style="color: ${t?.isAlert ? '#ef4444' : '#cbd5e1'}; ${t?.isAlert ? 'animation: pulse 1s infinite;' : ''}">${t?.label || '0%'}</span>
                    </div>
                    <div style="height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden;">
                        <div style="height: 100%; background: ${coresToner[i] || '#64748b'}; width: ${t?.percent || 0}%;"></div>
                    </div>
                </div>`).join('');

            return `
                <div class="card-impressora" style="background: #0d1117; padding: 1.25rem; border-radius: 1rem; border: 1px solid rgba(30,41,59,0.6); position: relative;">
                    <button onclick="deletarImpressora(${imp.id})" class="btn-deletar" style="position: absolute; top: 0.5rem; right: 0.5rem; opacity: 0; cursor: pointer; background: none; border: none;">🗑️</button>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <div><h3 style="font-weight: 700; font-size: 1.1rem;">${imp.name || 'N/A'}</h3><p style="font-size: 0.7rem; color: #64748b;">${imp.ip || '---'}</p></div>
                        <div style="width: 10px; height: 10px; border-radius: 50%; background: ${statusCor};"></div>
                    </div>
                    ${imp.hasError ? `<div style="color: #f87171; font-size: 0.6rem; margin-bottom: 0.5rem;">⚠️ ${(imp.errorMessages || []).join(' · ')}</div>` : ''}
                    <div style="display: grid; grid-template-columns: ${imp.isColor ? '1fr 1fr' : '1fr'}; gap: 0.5rem; margin-bottom: 1rem;">${tonersHTML}</div>
                    <div style="display: flex; justify-content: space-between; border-top: 1px solid rgba(30,41,59,0.4); padding-top: 0.75rem; font-size: 0.8rem;">
                        <span>📄 ${paginas}</span>
                        <span style="color: ${imp.paper === 'VAZIO' ? '#ef4444' : '#10b981'}">${imp.paper === 'VAZIO' ? 'SEM PAPEL' : 'PAPEL OK'}</span>
                    </div>
                </div>`;
        }

        // --- COMPUTADORES ---
        socket.on('computerUpdate', (data) => {
            if (!Array.isArray(data)) return;
            renderComputadores(data);
        });

        function renderComputadores(pcs) {
            const container = document.getElementById('lista-computadores');
            if (!container) return;
            container.innerHTML = pcs.map(pc => {
                const ramPercent = pc.totalRam > 0 ? Math.round((pc.usoRam / pc.totalRam) * 100) : 0;
                return `
                    <div style="background: #0d1117; padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(30,41,59,0.6); opacity: ${pc.online ? 1 : 0.6};">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                            <div><h3 style="font-weight: 700; color: #60a5fa;">${pc.nome}</h3><p style="font-size: 0.75rem; color: #64748b;">${pc.ip}</p></div>
                            <div style="width: 10px; height: 10px; border-radius: 50%; background: ${pc.online ? '#10b981' : '#64748b'};"></div>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.65rem; color: #64748b; margin-bottom: 4px;"><span>RAM</span><span>${ramPercent}%</span></div>
                            <div style="height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden;"><div style="height: 100%; background: #3b82f6; width: ${ramPercent}%;"></div></div>
                        </div>
                        <div style="display: flex; gap: 1rem; font-size: 0.7rem; color: #94a3b8; margin-bottom: 1rem;"><span>⬇️ ${pc.rxMbps || 0} Mbps</span><span>⬆️ ${pc.txMbps || 0} Mbps</span></div>
                        <div style="border-top: 1px solid rgba(30,41,59,0.3); padding-top: 0.75rem; font-size: 0.65rem; color: #475569;"><p>${pc.cliente} | ${pc.site}</p><p>${pc.so}</p></div>
                    </div>`;
            }).join('');
        }

        // --- CONTROLES ---
        function toggleGrupo(unidade) {
            const idx = abertos.indexOf(unidade);
            if (idx > -1) abertos.splice(idx, 1); else abertos.push(unidade);
            localStorage.setItem('abertos', JSON.stringify(abertos));
            // O render é automático no próximo ciclo de socket
        }
        function abrirModalImpressora() { document.getElementById('modal-impressora').style.display = 'flex'; }
        function fecharModalImpressora() { document.getElementById('modal-impressora').style.display = 'none'; }
        async function salvarImpressora() {
            const corpo = { unit: document.getElementById('in-unit').value, name: document.getElementById('in-name').value, ip: document.getElementById('in-ip').value, model: document.getElementById('in-model').value };
            await fetch('/api/printers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(corpo) });
            fecharModalImpressora();
        }
        async function deletarImpressora(id) { if (confirm('Remover?')) await fetch('/api/printers/' + id, { method: 'DELETE' }); }
    </script>
</body>
</html>
